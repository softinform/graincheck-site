<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<title>GrainCheck — каталог функціоналу</title>
<style>
  :root {
    --bg: #f6f7f9; --card: #fff; --border: #e3e6ea; --text: #1d2024;
    --muted: #6b7280; --primary: #2e7d32; --primary-bg: #e8f5e9;
    --warn: #b45309; --warn-bg: #fef3c7;
    --err: #b91c1c; --err-bg: #fee2e2;
    --info: #1d4ed8; --info-bg: #dbeafe;
    --pro: #7c3aed; --pro-bg: #ede9fe;
    --shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 24px 32px 64px;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    line-height: 1.5;
  }
  header {
    display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 12px;
    border-bottom: 2px solid var(--border); padding-bottom: 14px; margin-bottom: 22px;
  }
  header h1 { margin: 0; font-size: 24px; }
  header .meta { font-size: 13px; color: var(--muted); }
  header .meta strong { color: var(--text); }

  /* Filter row */
  .filters {
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    background: var(--card); padding: 12px 14px; border-radius: 12px;
    border: 1px solid var(--border); margin-bottom: 20px; box-shadow: var(--shadow);
  }
  .filters .group { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .filters .label-tiny { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-right: 4px; font-weight: 600; }
  .chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 11px; border-radius: 999px; font-size: 13px; font-weight: 500;
    background: #f1f3f5; color: #495057; border: 1px solid transparent;
    cursor: pointer; user-select: none; transition: all .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .chip:hover { background: #e9ecef; }
  .chip.active { background: var(--primary); color: #fff; }
  .chip.active.tag-pro { background: var(--pro); }
  .chip.active.tag-live { background: var(--primary); }
  .chip .count { font-size: 11px; opacity: 0.75; }

  .search {
    flex: 1; min-width: 200px; max-width: 320px; margin-left: auto;
    padding: 7px 12px; border: 1px solid var(--border); border-radius: 8px;
    font-size: 14px; outline: none; background: #fff;
  }
  .search:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-bg); }

  /* Stats bar */
  .stats {
    display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap;
  }
  .stat {
    background: var(--card); padding: 10px 16px; border-radius: 10px;
    border: 1px solid var(--border); box-shadow: var(--shadow);
    font-size: 13px; color: var(--muted);
  }
  .stat strong { display: block; font-size: 22px; color: var(--text); font-weight: 700; line-height: 1; margin-bottom: 4px; }

  /* Sections */
  section.area {
    margin-bottom: 36px;
  }
  section.area > h2 {
    font-size: 19px; margin: 0 0 4px;
    display: flex; align-items: center; gap: 10px;
  }
  section.area > h2 .icon { font-size: 22px; }
  section.area > .area-desc { color: var(--muted); font-size: 14px; margin: 0 0 14px; }

  .group {
    margin-bottom: 18px;
  }
  .group > h3 {
    font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px;
    font-weight: 600; margin: 12px 0 8px; padding-bottom: 4px; border-bottom: 1px dashed var(--border);
  }

  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 12px;
  }
  .feature {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 14px; box-shadow: var(--shadow);
    display: flex; flex-direction: column; gap: 6px;
    transition: transform .15s, box-shadow .15s;
  }
  .feature:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,0.06); }
  .feature.dimmed { opacity: 0.25; transform: none; }
  .feature h4 {
    margin: 0; font-size: 14.5px; font-weight: 600; line-height: 1.35;
    display: flex; align-items: center; gap: 6px;
  }
  .feature .desc { font-size: 13px; color: #3d434a; margin: 0; }

  .pill {
    display: inline-block; padding: 1px 8px; border-radius: 999px;
    font-size: 11px; font-weight: 600; line-height: 1.5;
    text-transform: lowercase; letter-spacing: .2px;
  }
  .tag-live { background: var(--primary-bg); color: var(--primary); }
  .tag-pro  { background: var(--pro-bg); color: var(--pro); }
  .tag-free { background: #f1f3f5; color: #495057; }
  .tag-locked { background: var(--warn-bg); color: var(--warn); }
  .tag-in-dev { background: var(--info-bg); color: var(--info); }
  .tag-broken { background: var(--err-bg); color: var(--err); }

  .tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .feature .meta-row {
    display: flex; justify-content: space-between; align-items: center; gap: 8px;
    margin-top: auto; padding-top: 6px; font-size: 11.5px; color: var(--muted);
  }
  .feature .source {
    font-family: ui-monospace, "SF Mono", Monaco, monospace; font-size: 11px;
    color: var(--muted); background: #f3f4f6; padding: 2px 6px; border-radius: 4px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px;
  }
  .feature .source:hover { color: var(--primary); cursor: help; }

  .empty {
    text-align: center; padding: 40px 20px; color: var(--muted);
    background: var(--card); border-radius: 10px; border: 1px dashed var(--border);
  }

  @media (max-width: 700px) {
    body { padding: 14px 16px 40px; }
    header { flex-direction: column; align-items: flex-start; }
    .search { margin-left: 0; width: 100%; max-width: 100%; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>GrainCheck — каталог функціоналу</h1>
    <div class="meta">Що додаток <strong>зараз</strong> уміє · поточна версія <strong id="m-version">—</strong> · оновлено <strong id="m-date">—</strong></div>
  </div>
  <div class="meta">Single source of truth · <code>docs/features.html</code></div>
</header>

<div class="stats" id="stats"></div>

<div class="filters">
  <div class="group">
    <span class="label-tiny">Розділ:</span>
    <div id="filter-areas"></div>
  </div>
  <div class="group">
    <span class="label-tiny">Тег:</span>
    <div id="filter-tags"></div>
  </div>
  <input type="text" class="search" id="search" placeholder="🔍 пошук за назвою або описом…">
</div>

<main id="main"></main>

<script>
(function() {
  const data = JSON.parse(document.getElementById('features').textContent);
  document.getElementById('m-version').textContent = 'v' + data.version;
  document.getElementById('m-date').textContent = data.lastUpdated;

  // ── Collect all features flat + tag stats
  const all = [];
  for (const area of data.areas) {
    for (const group of area.groups) {
      for (const f of group.features) {
        all.push({ ...f, _area: area.id, _areaTitle: area.title, _group: group.title });
      }
    }
  }

  const tagCounts = {};
  for (const f of all) {
    for (const t of (f.tags || [])) {
      tagCounts[t] = (tagCounts[t] || 0) + 1;
    }
  }

  // ── Stats bar
  const stats = document.getElementById('stats');
  stats.innerHTML = `
    <div class="stat"><strong>${all.length}</strong>фіч у каталозі</div>
    <div class="stat"><strong>${data.areas.length}</strong>розділів</div>
    <div class="stat"><strong>${tagCounts.live || 0}</strong>в продакшені</div>
    <div class="stat"><strong>${tagCounts.pro || 0}</strong>Pro-функції</div>
  `;

  // ── Filter state
  const state = { area: null, tag: null, query: '' };

  // ── Area chips
  const areaCtr = document.getElementById('filter-areas');
  const allChip = (label, key, val) => {
    const c = document.createElement('span');
    c.className = 'chip';
    c.dataset.kind = key; c.dataset.value = val;
    c.textContent = label;
    return c;
  };
  const allAreasChip = allChip('Усі', 'area', '');
  allAreasChip.classList.add('active');
  areaCtr.appendChild(allAreasChip);
  for (const area of data.areas) {
    const count = all.filter(f => f._area === area.id).length;
    const c = allChip(`${area.icon} ${area.title}`, 'area', area.id);
    const sub = document.createElement('span'); sub.className = 'count'; sub.textContent = count;
    c.appendChild(document.createTextNode(' '));
    c.appendChild(sub);
    areaCtr.appendChild(c);
  }

  // ── Tag chips
  const tagCtr = document.getElementById('filter-tags');
  const allTagsChip = allChip('Усі', 'tag', '');
  allTagsChip.classList.add('active');
  tagCtr.appendChild(allTagsChip);
  const tagLabels = { live: '✅ live', pro: '👑 Pro', free: 'free', 'in-dev': '🚧 in-dev', broken: '⛔ broken', locked: '🔒 locked' };
  for (const tag of Object.keys(tagCounts).sort()) {
    const c = allChip(tagLabels[tag] || tag, 'tag', tag);
    c.classList.add('tag-' + tag);
    const sub = document.createElement('span'); sub.className = 'count'; sub.textContent = tagCounts[tag];
    c.appendChild(document.createTextNode(' '));
    c.appendChild(sub);
    tagCtr.appendChild(c);
  }

  // ── Filter logic
  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const kind = chip.dataset.kind;
      const val = chip.dataset.value;
      document.querySelectorAll(`.chip[data-kind="${kind}"]`).forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      state[kind] = val || null;
      render();
    });
  });

  document.getElementById('search').addEventListener('input', (e) => {
    state.query = e.target.value.toLowerCase().trim();
    render();
  });

  // ── Render
  const main = document.getElementById('main');
  function matches(f) {
    if (state.area && f._area !== state.area) return false;
    if (state.tag && !(f.tags || []).includes(state.tag)) return false;
    if (state.query) {
      const hay = (f.name + ' ' + f.description + ' ' + (f.tags || []).join(' ')).toLowerCase();
      if (!hay.includes(state.query)) return false;
    }
    return true;
  }

  function render() {
    main.innerHTML = '';
    let totalShown = 0;
    for (const area of data.areas) {
      const areaFeatures = [];
      for (const group of area.groups) {
        for (const f of group.features) {
          areaFeatures.push({ ...f, _area: area.id, _group: group.title });
        }
      }
      const shown = areaFeatures.filter(matches);
      if (shown.length === 0) continue;

      const sec = document.createElement('section');
      sec.className = 'area';
      sec.innerHTML = `<h2><span class="icon">${area.icon}</span> ${area.title} <span style="font-size:13px;color:var(--muted);font-weight:400;">· ${shown.length}/${areaFeatures.length}</span></h2><p class="area-desc">${area.description}</p>`;
      main.appendChild(sec);

      const groupedShown = {};
      for (const f of shown) {
        if (!groupedShown[f._group]) groupedShown[f._group] = [];
        groupedShown[f._group].push(f);
      }
      for (const groupTitle of Object.keys(groupedShown)) {
        const gDiv = document.createElement('div'); gDiv.className = 'group';
        gDiv.innerHTML = `<h3>${groupTitle}</h3>`;
        const grid = document.createElement('div'); grid.className = 'grid';
        for (const f of groupedShown[groupTitle]) {
          const card = document.createElement('div'); card.className = 'feature';
          const tagsHtml = (f.tags || []).map(t => `<span class="pill tag-${t}">${t}</span>`).join('');
          card.innerHTML = `
            <div class="tags">${tagsHtml}</div>
            <h4>${f.name}</h4>
            <p class="desc">${f.description}</p>
            <div class="meta-row">
              <span class="source" title="${f.source}">${f.source}</span>
            </div>
          `;
          grid.appendChild(card);
          totalShown++;
        }
        gDiv.appendChild(grid);
        sec.appendChild(gDiv);
      }
    }
    if (totalShown === 0) {
      main.innerHTML = '<div class="empty">Нічого не знайдено за фільтрами</div>';
    }
  }

  render();
})();
</script>
